<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Kalpa AI</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-layout">
        <div class="app-main">
            <div class="page-content">
                <div class="page-header">
                    <div class="page-title-group">
                        <h1 class="page-title">Inventory</h1>
                        <p class="page-subtitle">Monitor stock levels and manage inventory</p>
                    </div>
                </div>

                <div class="stats-grid stats-grid-5 stagger-children" id="inventory-stats">
                    <!-- Stats will be populated here -->
                </div>

                <div class="card" style="margin-bottom: var(--spacing-xl);">
                    <div class="card-header">
                        <h2 class="card-title">AI Stock Alerts</h2>
                    </div>
                    <div class="card-body" id="ai-alerts-container">
                        <!-- Alerts will be populated here -->
                    </div>
                </div>

                <div class="card table-container">
                    <div class="table-toolbar">
                        <div class="search-box">
                            <i data-lucide="search"></i>
                            <input type="text" id="inventory-search" class="form-input" placeholder="Search products or SKUs...">
                        </div>
                        <div class="filter-group">
                            <select id="status-filter" class="form-select">
                                <option value="all">All Status</option>
                                <option value="in_stock">In Stock</option>
                                <option value="low_stock">Low Stock</option>
                                <option value="out_of_stock">Out of Stock</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table" id="inventory-table">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>SKU</th>
                                    <th>Category</th>
                                    <th>Current Stock</th>
                                    <th>Status</th>
                                    <th>Price</th>
                                    <th>Last Updated</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-tbody">
                                <!-- Table rows will go here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="pagination-container" class="pagination-container">
                        <!-- Pagination will go here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            KalpaLayout.init();
            
            const products = KalpaStore.getProducts();
            
            // Calculate stats
            const totalProducts = products.length;
            const lowStock = products.filter(p => p.stock <= 10 && p.stock > 0).length;
            const outOfStock = products.filter(p => p.stock === 0).length;
            const categories = new Set(products.map(p => p.category)).size;
            const inventoryValue = products.reduce((sum, p) => sum + (p.sellingPrice * p.stock), 0);

            // Render stats
            const statsContainer = document.getElementById('inventory-stats');
            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Total Products</span>
                    </div>
                    <div class="stat-value">${totalProducts}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Low Stock</span>
                    </div>
                    <div class="stat-value" style="color: var(--warning, #F59E0B);">${lowStock}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Out of Stock</span>
                    </div>
                    <div class="stat-value" style="color: var(--danger, #EF4444);">${outOfStock}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Categories</span>
                    </div>
                    <div class="stat-value">${categories}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Inventory Value</span>
                    </div>
                    <div class="stat-value">${KalpaLayout.formatCurrency(inventoryValue)}</div>
                </div>
            `;

            // AI Alerts
            const alertsContainer = document.getElementById('ai-alerts-container');
            const alertProducts = products.filter(p => p.stock <= 10);
            
            if (alertProducts.length === 0) {
                alertsContainer.innerHTML = `
                    <div style="padding: 16px; display: flex; align-items: center; gap: 8px; color: var(--success, #10B981);">
                        <span>✅</span>
                        <span>All stock levels healthy</span>
                    </div>
                `;
            } else {
                let alertsHtml = '<div style="display: flex; flex-direction: column; gap: 8px;">';
                alertProducts.slice(0, 5).forEach(p => {
                    const isOut = p.stock === 0;
                    alertsHtml += `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; border: 1px solid var(--border-color, #E5E7EB); border-radius: 8px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <span style="font-size: 18px;">${isOut ? '🚨' : '⚠️'}</span>
                                <div>
                                    <div style="font-weight: 500;">${p.name}</div>
                                    <div style="font-size: 12px; color: var(--text-secondary, #6B7280);">Current Stock: ${p.stock} units</div>
                                </div>
                            </div>
                            <button class="btn btn-secondary btn-sm" onclick="restockProduct('${p.id}')">Restock</button>
                        </div>
                    `;
                });
                alertsHtml += '</div>';
                alertsContainer.innerHTML = alertsHtml;
            }

            // Table state
            let currentPage = 1;
            const itemsPerPage = 10;
            let filteredProducts = [...products];

            const tbody = document.getElementById('inventory-tbody');
            const searchInput = document.getElementById('inventory-search');
            const statusFilter = document.getElementById('status-filter');
            const paginationContainer = document.getElementById('pagination-container');

            function renderTable() {
                const startIndex = (currentPage - 1) * itemsPerPage;
                const paginatedProducts = filteredProducts.slice(startIndex, startIndex + itemsPerPage);
                
                tbody.innerHTML = '';
                
                if (paginatedProducts.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 48px; color: var(--text-secondary, #6B7280);">
                                No products found matching your filters.
                            </td>
                        </tr>
                    `;
                    paginationContainer.innerHTML = '';
                    return;
                }

                paginatedProducts.forEach(p => {
                    const status = KalpaLayout.stockStatus(p.stock);
                    const initial = p.name.charAt(0).toUpperCase();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <div style="width: 32px; height: 32px; border-radius: 50%; background: #EFF6FF; color: #2563EB; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px;">
                                    ${initial}
                                </div>
                                <span style="font-weight: 500;">${p.name}</span>
                            </div>
                        </td>
                        <td style="font-family: monospace; color: var(--text-secondary, #6B7280);">${p.sku || p.id}</td>
                        <td>${p.category}</td>
                        <td style="font-weight: 500;">${p.stock}</td>
                        <td>${KalpaLayout.statusBadge(status)}</td>
                        <td>${KalpaLayout.formatCurrency(p.sellingPrice)}</td>
                        <td style="color: var(--text-secondary, #6B7280);">${KalpaLayout.formatDate(p.updatedAt || p.createdAt || new Date().toISOString())}</td>
                    `;
                    tbody.appendChild(tr);
                });

                const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
                KalpaLayout.renderPagination(paginationContainer, currentPage, totalPages, (newPage) => {
                    currentPage = newPage;
                    renderTable();
                });
            }

            function applyFilters() {
                const searchTerm = searchInput.value.toLowerCase();
                const statusValue = statusFilter.value;

                filteredProducts = products.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(searchTerm) || (p.sku || p.id).toLowerCase().includes(searchTerm);
                    let matchesStatus = true;
                    
                    const status = KalpaLayout.stockStatus(p.stock);
                    if (statusValue === 'in_stock') matchesStatus = status === 'in-stock';
                    else if (statusValue === 'low_stock') matchesStatus = status === 'low-stock';
                    else if (statusValue === 'out_of_stock') matchesStatus = status === 'out-of-stock';

                    return matchesSearch && matchesStatus;
                });

                currentPage = 1;
                renderTable();
            }

            searchInput.addEventListener('input', applyFilters);
            statusFilter.addEventListener('change', applyFilters);

            renderTable();
        });

        function restockProduct(productId) {
            const product = KalpaStore.getProduct(productId);
            if (product) {
                KalpaStore.updateProduct(productId, { stock: product.stock + 25 });
                KalpaAnimations.showToast('Restocked', `${product.name} restocked with 25 units`, 'success');
                setTimeout(() => location.reload(), 1000);
            }
        }
    </script>
</body>
</html>
