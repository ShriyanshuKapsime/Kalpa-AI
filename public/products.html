<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Kalpa AI</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .toolbar {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            align-items: center;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
            max-width: 320px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--color-gray-500);
        }

        .search-input {
            width: 100%;
            padding-left: 36px;
        }

        .product-thumbnail {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--color-gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-gray-500);
        }

        .price-container {
            display: flex;
            flex-direction: column;
        }

        .price-mrp {
            text-decoration: line-through;
            color: var(--color-gray-500);
            font-size: var(--text-sm);
        }

        .empty-state {
            padding: 48px;
            text-align: center;
            color: var(--color-gray-500);
        }

        .table-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--color-gray-500);
            border-radius: 4px;
        }

        .table-action-btn:hover {
            background: var(--color-gray-100);
            color: var(--color-gray-900);
        }

        .table-action-btn.danger:hover {
            background: #FEE2E2;
            color: #DC2626;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="app-main">
            <div class="page-content">
                <div class="page-header">
                    <h1 class="text-2xl font-bold">Products</h1>
                    <a href="add-product.html" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Product
                    </a>
                </div>

                <div class="card">
                    <div class="toolbar">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="searchInput" class="form-input search-input" placeholder="Search products...">
                        </div>
                        <select id="categoryFilter" class="form-input filter-select" style="max-width: 200px;">
                            <option value="">All Categories</option>
                        </select>
                        <select id="statusFilter" class="form-input filter-select" style="max-width: 200px;">
                            <option value="">All Statuses</option>
                            <option value="active">Active</option>
                            <option value="draft">Draft</option>
                            <option value="out_of_stock">Out of Stock</option>
                        </select>
                    </div>

                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Product</th>
                                    <th>Category</th>
                                    <th>Stock</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>AI Confidence</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                                <!-- Products injected here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="paginationContainer" style="margin-top: 16px; display: flex; justify-content: flex-end;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/charts.js"></script>

    <script>
        let currentPage = 1;
        const itemsPerPage = 10;
        let filteredProducts = [];

        document.addEventListener('DOMContentLoaded', () => {
            KalpaLayout.init();
            initFilters();
            loadProducts();

            document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; loadProducts(); });
            document.getElementById('categoryFilter').addEventListener('change', () => { currentPage = 1; loadProducts(); });
            document.getElementById('statusFilter').addEventListener('change', () => { currentPage = 1; loadProducts(); });
        });

        function initFilters() {
            const stats = KalpaStore.getStats();
            const categorySelect = document.getElementById('categoryFilter');
            
            if (stats && stats.categories) {
                stats.categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.name;
                    option.textContent = cat.name;
                    categorySelect.appendChild(option);
                });
            } else {
                // Fallback categories if getStats doesn't provide them
                const categories = [...new Set(KalpaStore.getProducts().map(p => p.category))];
                categories.forEach(cat => {
                    if(!cat) return;
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categorySelect.appendChild(option);
                });
            }
        }

        function loadProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            let products = KalpaStore.getProducts();

            filteredProducts = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                const matchesCategory = !categoryFilter || p.category === categoryFilter;
                const matchesStatus = !statusFilter || p.status === statusFilter;
                return matchesSearch && matchesCategory && matchesStatus;
            });

            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('productsTableBody');
            const paginationContainer = document.getElementById('paginationContainer');
            tbody.innerHTML = '';

            const totalItems = filteredProducts.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentItems = filteredProducts.slice(startIndex, endIndex);

            if (currentItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">No products found matching your filters.</div></td></tr>';
                paginationContainer.innerHTML = '';
                return;
            }

            currentItems.forEach(product => {
                const tr = document.createElement('tr');
                tr.classList.add('stagger-item');
                
                let stockColor = '';
                if (product.stock === 0) stockColor = 'color: var(--color-danger); font-weight: bold;';
                else if (product.stock <= 10) stockColor = 'color: var(--color-warning); font-weight: bold;';

                tr.innerHTML = `
                    <td>
                        <div class="product-thumbnail">
                            ${product.image ? `<img src="${product.image}" alt="${product.name}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">` : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`}
                        </div>
                    </td>
                    <td class="table-cell-primary">${product.name}</td>
                    <td><span class="badge badge-gray">${product.category || 'Uncategorized'}</span></td>
                    <td style="${stockColor}">${product.stock}</td>
                    <td>
                        <div class="price-container">
                            <span>${KalpaLayout.formatCurrency(product.sellingPrice)}</span>
                            ${product.mrp && product.mrp > product.sellingPrice ? `<span class="price-mrp">${KalpaLayout.formatCurrency(product.mrp)}</span>` : ''}
                        </div>
                    </td>
                    <td>${KalpaLayout.statusBadge(product.status)}</td>
                    <td>${KalpaLayout.confidenceBadge(product.confidenceScore || 0)}</td>
                    <td>
                        <button class="table-action-btn" onclick="editProduct('${product.id}')" title="Edit">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="table-action-btn danger" onclick="deleteProduct('${product.id}')" title="Delete">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            KalpaLayout.renderPagination(currentPage, totalPages, 'paginationContainer', (newPage) => {
                currentPage = newPage;
                renderTable();
            });
            
            // Re-trigger stagger animation if applicable
            if (window.KalpaAnimations && typeof window.KalpaAnimations.staggerChildren === 'function') {
                window.KalpaAnimations.staggerChildren(tbody);
            }
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                KalpaStore.deleteProduct(id);
                loadProducts();
            }
        }

        function editProduct(id) {
            window.location.href = `add-product.html?id=${id}`;
        }
    </script>
</body>
</html>
