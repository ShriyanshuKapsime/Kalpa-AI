<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Kalpa AI</title>
    <!-- CSS files -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-layout">
        <div class="app-main">
            <div class="page-content">
                <div class="page-header">
                    <h1 class="page-title">Settings</h1>
                    <p class="page-subtitle" style="color: #64748B; margin-top: 0.5rem;">Manage your account and store preferences</p>
                </div>

                <div class="tabs" id="settings-tabs">
                    <button class="tab active" data-target="profile-tab">Profile</button>
                    <button class="tab" data-target="business-tab">Business</button>
                    <button class="tab" data-target="store-tab">Store</button>
                </div>

                <!-- Profile Tab -->
                <div id="profile-tab" class="tab-content" style="display: block;">
                    <div class="card">
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                            <div style="width: 64px; height: 64px; border-radius: 50%; background: #2563EB; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 600;" id="avatar-initial">U</div>
                            <div>
                                <button class="btn btn-secondary btn-sm" type="button">Change Avatar</button>
                            </div>
                        </div>
                        <form id="profile-form">
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Merchant Name</label>
                                <input type="text" id="merchant-name" class="form-input" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                            </div>
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email</label>
                                <input type="email" id="merchant-email" class="form-input" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px; background: #F1F5F9; color: #64748B;" disabled readonly>
                            </div>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Phone</label>
                                <input type="text" id="merchant-phone" class="form-input" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                            </div>
                            <button type="submit" class="btn btn-primary">Save Profile</button>
                        </form>
                    </div>
                </div>

                <!-- Business Tab -->
                <div id="business-tab" class="tab-content" style="display: none;">
                    <div class="card">
                        <form id="business-form">
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Business Name</label>
                                <input type="text" id="business-name" class="form-input" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                            </div>
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Business Category</label>
                                <select id="business-category" class="form-input" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                                    <option value="retail">Retail</option>
                                    <option value="electronics">Electronics</option>
                                    <option value="clothing">Clothing & Apparel</option>
                                    <option value="grocery">Grocery</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Business Address</label>
                                <textarea id="business-address" class="form-input" rows="3" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Save Business Details</button>
                        </form>
                    </div>
                </div>

                <!-- Store Tab -->
                <div id="store-tab" class="tab-content" style="display: none;">
                    <div class="card">
                        <form id="store-form">
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Store Name</label>
                                <input type="text" id="store-name" class="form-input" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                            </div>
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Store Description</label>
                                <textarea id="store-desc" class="form-input" rows="2" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;"></textarea>
                            </div>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Contact Number</label>
                                <input type="text" id="store-phone" class="form-input" style="width: 100%; padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                            </div>
                            
                            <div style="margin-bottom: 1.5rem;">
                                <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Business Hours</label>
                                <div style="display: grid; gap: 0.5rem;">
                                    <!-- Mon-Sun -->
                                    <script>
                                        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
                                        days.forEach(day => {
                                            document.write(`
                                                <div style="display: grid; grid-template-columns: 100px 1fr 1fr; gap: 1rem; align-items: center;">
                                                    <span style="font-size: 0.875rem; font-weight: 500;">${day}</span>
                                                    <input type="time" class="form-input" value="09:00" style="padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                                                    <input type="time" class="form-input" value="20:00" style="padding: 0.5rem; border: 1px solid #CBD5E1; border-radius: 4px;">
                                                </div>
                                            `);
                                        });
                                    </script>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Save Store Settings</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- JS files -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            KalpaLayout.init();

            // Tab Switching functionality
            const tabs = document.querySelectorAll('#settings-tabs .tab');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.style.display = 'none');
                    tab.classList.add('active');
                    const targetId = tab.getAttribute('data-target');
                    document.getElementById(targetId).style.display = 'block';
                });
            });

            // Populate Profile Data
            const merchant = KalpaAuth.getCurrentMerchant();
            if (merchant) {
                document.getElementById('merchant-name').value = merchant.name || '';
                document.getElementById('merchant-email').value = merchant.email || '';
                document.getElementById('merchant-phone').value = merchant.phone || '';
                document.getElementById('avatar-initial').textContent = (merchant.name || 'U').charAt(0).toUpperCase();

                // Populate Business Data from merchant
                document.getElementById('business-name').value = merchant.businessName || '';
                document.getElementById('business-category').value = merchant.businessCategory || 'retail';
                document.getElementById('business-address').value = merchant.businessAddress || '';
            }

            // Populate Store Data
            const store = KalpaStore.getStoreProfile() || {};
            document.getElementById('store-name').value = store.storeName || store.name || '';
            document.getElementById('store-desc').value = store.description || '';
            document.getElementById('store-phone').value = store.phone || (merchant ? merchant.phone : '') || '';

            // Handle Profile Save
            document.getElementById('profile-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                KalpaAnimations.setButtonLoading(btn, true);

                const name = document.getElementById('merchant-name').value.trim();
                const phone = document.getElementById('merchant-phone').value.trim();

                if (!name || name.length < 2) {
                    KalpaAnimations.showToast('Validation Error', 'Name must be at least 2 characters', 'warning');
                    KalpaAnimations.setButtonLoading(btn, false, 'Save Profile');
                    return;
                }

                KalpaAuth.updateMerchant({ name, phone });
                document.getElementById('avatar-initial').textContent = name.charAt(0).toUpperCase();

                setTimeout(() => {
                    KalpaAnimations.setButtonLoading(btn, false, 'Save Profile');
                    KalpaAnimations.showToast('Profile Updated', 'Your profile has been saved successfully', 'success');
                }, 400);
            });

            // Handle Business Save
            document.getElementById('business-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                KalpaAnimations.setButtonLoading(btn, true);

                const businessName = document.getElementById('business-name').value.trim();
                const businessCategory = document.getElementById('business-category').value;
                const businessAddress = document.getElementById('business-address').value.trim();

                KalpaAuth.updateMerchant({ businessName, businessCategory, businessAddress });

                setTimeout(() => {
                    KalpaAnimations.setButtonLoading(btn, false, 'Save Business Details');
                    KalpaAnimations.showToast('Business Updated', 'Business details have been saved successfully', 'success');
                }, 400);
            });

            // Handle Store Save
            document.getElementById('store-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                KalpaAnimations.setButtonLoading(btn, true);

                const storeName = document.getElementById('store-name').value.trim();
                const description = document.getElementById('store-desc').value.trim();
                const phone = document.getElementById('store-phone').value.trim();

                const existingProfile = KalpaStore.getStoreProfile() || {};
                KalpaStore.setStoreProfile({
                    ...existingProfile,
                    storeName,
                    name: storeName,
                    description,
                    phone,
                });

                setTimeout(() => {
                    KalpaAnimations.setButtonLoading(btn, false, 'Save Store Settings');
                    KalpaAnimations.showToast('Store Settings Updated', 'Store settings have been saved successfully', 'success');
                }, 400);
            });
        });
    </script>
</body>
</html>
