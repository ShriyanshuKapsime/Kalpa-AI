<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Kalpa AI</title>
    <!-- CSS files -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-layout">
        <div class="app-main">
            <div class="page-content">
                <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1 class="page-title">Notifications</h1>
                    </div>
                    <button class="btn btn-secondary btn-sm" id="mark-all-read-btn">Mark All Read</button>
                </div>

                <div class="tabs" id="notification-tabs">
                    <button class="tab active" data-filter="all">All</button>
                    <button class="tab" data-filter="order">Orders</button>
                    <button class="tab" data-filter="inventory">Inventory</button>
                    <button class="tab" data-filter="ai">AI Suggestions</button>
                    <button class="tab" data-filter="system">System</button>
                </div>

                <div class="card">
                    <div id="notifications-list">
                        <!-- Notifications will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS files -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            KalpaLayout.init();
            
            let currentFilter = 'all';

            const svgs = {
                order: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>',
                inventory: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>',
                ai: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>',
                success: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>',
                alert: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
                system: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>'
            };

            function renderNotifications() {
                const list = document.getElementById('notifications-list');
                const allNotifications = KalpaStore.getNotifications ? KalpaStore.getNotifications() : [];
                
                const filtered = currentFilter === 'all' 
                    ? allNotifications 
                    : allNotifications.filter(n => n.type === currentFilter);
                
                if (filtered.length === 0) {
                    list.innerHTML = `
                        <div style="padding: 3rem; text-align: center; color: #64748B;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;">
                                <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"></path>
                            </svg>
                            <p>No notifications found.</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = filtered.map(n => {
                    const iconClass = n.type || 'system';
                    const iconSvg = svgs[iconClass] || svgs.system;
                    const unreadClass = n.read ? '' : 'unread';
                    
                    return `
                        <div class="notification-item ${unreadClass}" data-id="${n.id}" style="display: flex; gap: 1rem; padding: 1rem; border-bottom: 1px solid #E2E8F0; cursor: pointer;">
                            <div class="notification-icon ${iconClass}" style="flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #EFF6FF; color: #2563EB;">
                                ${iconSvg}
                            </div>
                            <div style="flex: 1;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.25rem;">
                                    <h4 class="notification-title" style="margin: 0; font-size: 0.875rem; font-weight: 600; color: #0F172A;">${n.title}</h4>
                                    <span class="notification-time" style="font-size: 0.75rem; color: #64748B;">${KalpaLayout.formatRelativeTime(n.timestamp)}</span>
                                </div>
                                <p class="notification-desc" style="margin: 0; font-size: 0.875rem; color: #475569;">${n.message}</p>
                            </div>
                            ${!n.read ? '<div style="width: 8px; height: 8px; border-radius: 50%; background: #2563EB; align-self: center;"></div>' : ''}
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.notification-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const id = item.getAttribute('data-id');
                        if (KalpaStore.markNotificationRead) {
                            KalpaStore.markNotificationRead(id);
                        }
                        renderNotifications();
                    });
                });
            }

            renderNotifications();

            // Tabs setup
            document.querySelectorAll('#notification-tabs .tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('#notification-tabs .tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.getAttribute('data-filter');
                    renderNotifications();
                });
            });

            // Mark all read action
            document.getElementById('mark-all-read-btn').addEventListener('click', () => {
                if (KalpaStore.markAllNotificationsRead) {
                    KalpaStore.markAllNotificationsRead();
                }
                renderNotifications();
            });
        });
    </script>
</body>
</html>
