<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Kalpa AI</title>
    <!-- Shared CSS files -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-layout">
        <div class="app-main">
            <div class="page-content">
                <!-- Page Header -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Orders</h1>
                        <p class="page-subtitle">Track and manage customer orders</p>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid-5 stagger-children" id="orders-stats">
                    <div class="stat-card card">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" id="stat-total-orders">0</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="stat-pending">0</div>
                        <div class="stat-trend badge badge-warning">Pending</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Processing</div>
                        <div class="stat-value" id="stat-processing">0</div>
                        <div class="stat-trend badge badge-info">Processing</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Delivered</div>
                        <div class="stat-value" id="stat-delivered">0</div>
                        <div class="stat-trend badge badge-success">Delivered</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Total Revenue</div>
                        <div class="stat-value" id="stat-total-revenue">0</div>
                    </div>
                </div>

                <!-- Orders Table -->
                <div class="card table-container" style="margin-top: 1.5rem;">
                    <div class="table-toolbar" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <input type="text" id="order-search" class="form-input" placeholder="Search by Order ID or Customer..." style="max-width: 300px;">
                        <select id="order-status-filter" class="form-input" style="max-width: 200px;">
                            <option value="">All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table" id="orders-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Items</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Payment</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                    <div id="pagination-container" style="margin-top: 1rem;">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="modal-backdrop">
        <div class="modal-container card" style="max-width: 700px; width: 100%; margin: 4rem auto; max-height: 80vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-200); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h2 style="font-size: 1.25rem; font-weight: 600;">Order Details</h2>
                <button id="close-modal" class="btn btn-icon" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body" id="order-modal-body">
                <!-- Order details will go here -->
            </div>
        </div>
    </div>

    <!-- Shared JS files -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/animations.js"></script>
    
    <!-- Page specific logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize layout
            if (typeof KalpaLayout !== 'undefined') {
                KalpaLayout.init();
            }

            // Page State
            let allOrders = [];
            let filteredOrders = [];
            let currentPage = 1;
            const itemsPerPage = 10;

            // DOM Elements
            const tableBody = document.getElementById('orders-table-body');
            const searchInput = document.getElementById('order-search');
            const statusFilter = document.getElementById('order-status-filter');
            const paginationContainer = document.getElementById('pagination-container');
            const modal = document.getElementById('order-modal');
            const closeModalBtn = document.getElementById('close-modal');
            const modalBody = document.getElementById('order-modal-body');

            // Load Data
            async function loadData() {
                try {
                    allOrders = await KalpaStore.getOrders();
                    updateStats(allOrders);
                    filterOrders();
                } catch (error) {
                    console.error('Error loading orders:', error);
                }
            }

            function updateStats(orders) {
                const total = orders.length;
                let pending = 0;
                let processing = 0;
                let delivered = 0;
                let revenue = 0;

                orders.forEach(order => {
                    const status = (order.status || '').toLowerCase();
                    if (status === 'pending') pending++;
                    if (status === 'processing') processing++;
                    if (status === 'delivered') delivered++;
                    if (status !== 'cancelled') revenue += (order.total || 0);
                });

                if (typeof KalpaAnimations !== 'undefined') {
                    KalpaAnimations.animateCounter(document.getElementById('stat-total-orders'), total);
                    KalpaAnimations.animateCounter(document.getElementById('stat-pending'), pending);
                    KalpaAnimations.animateCounter(document.getElementById('stat-processing'), processing);
                    KalpaAnimations.animateCounter(document.getElementById('stat-delivered'), delivered);
                }
                
                if (typeof KalpaLayout !== 'undefined') {
                    document.getElementById('stat-total-revenue').textContent = KalpaLayout.formatCurrency(revenue);
                } else {
                    document.getElementById('stat-total-revenue').textContent = '₹' + revenue.toFixed(2);
                }
            }

            function filterOrders() {
                const searchTerm = searchInput.value.toLowerCase();
                const statusTerm = statusFilter.value.toLowerCase();

                filteredOrders = allOrders.filter(order => {
                    const matchesSearch = 
                        (order.id && order.id.toLowerCase().includes(searchTerm)) || 
                        (order.customer && order.customer.name && order.customer.name.toLowerCase().includes(searchTerm));
                    const matchesStatus = !statusTerm || (order.status && order.status.toLowerCase() === statusTerm);
                    return matchesSearch && matchesStatus;
                });

                currentPage = 1;
                renderTable();
            }

            function renderTable() {
                tableBody.innerHTML = '';
                
                const startIdx = (currentPage - 1) * itemsPerPage;
                const endIdx = startIdx + itemsPerPage;
                const paginatedOrders = filteredOrders.slice(startIdx, endIdx);

                if (paginatedOrders.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 2rem;">No orders found.</td></tr>';
                } else {
                    paginatedOrders.forEach(order => {
                        const tr = document.createElement('tr');
                        tr.style.cursor = 'pointer';
                        
                        const itemsCount = order.items ? order.items.reduce((sum, item) => sum + (item.quantity || 1), 0) : 0;
                        
                        tr.innerHTML = `
                            <td><span class="order-id" style="font-family: monospace; color: var(--primary);">${order.id}</span></td>
                            <td>${order.customer?.name || 'N/A'}</td>
                            <td>${itemsCount}</td>
                            <td>${typeof KalpaLayout !== 'undefined' ? KalpaLayout.formatCurrency(order.total) : '₹' + order.total}</td>
                            <td>${typeof KalpaLayout !== 'undefined' ? KalpaLayout.statusBadge(order.status) : order.status}</td>
                            <td>${order.paymentMethod || 'N/A'}</td>
                            <td>${typeof KalpaLayout !== 'undefined' ? KalpaLayout.formatDate(order.date) : order.date}</td>
                            <td onclick="event.stopPropagation()">
                                <button class="btn btn-icon view-btn" title="View Order">
                                    ${typeof KalpaLayout !== 'undefined' && KalpaLayout.icons ? KalpaLayout.icons.eye : '👁️'}
                                </button>
                            </td>
                        `;

                        tr.addEventListener('click', () => openModal(order));
                        
                        const viewBtn = tr.querySelector('.view-btn');
                        if (viewBtn) {
                            viewBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                openModal(order);
                            });
                        }

                        tableBody.appendChild(tr);
                    });
                }

                renderPagination();
            }

            function renderPagination() {
                const totalPages = Math.ceil(filteredOrders.length / itemsPerPage);
                if (typeof KalpaLayout !== 'undefined' && KalpaLayout.renderPagination) {
                    paginationContainer.innerHTML = KalpaLayout.renderPagination(currentPage, totalPages);
                    
                    const pageButtons = paginationContainer.querySelectorAll('.page-btn');
                    pageButtons.forEach(btn => {
                        btn.addEventListener('click', () => {
                            if (btn.disabled || btn.classList.contains('active')) return;
                            const text = btn.textContent;
                            if (text === 'Previous') {
                                currentPage = Math.max(1, currentPage - 1);
                            } else if (text === 'Next') {
                                currentPage = Math.min(totalPages, currentPage + 1);
                            } else {
                                currentPage = parseInt(text);
                            }
                            renderTable();
                        });
                    });
                }
            }

            function openModal(order) {
                let itemsHtml = '<div style="margin-top: 1.5rem;"><h3 style="font-size: 1rem; margin-bottom: 0.5rem; font-weight: 600;">Order Items</h3>';
                if (order.items && order.items.length > 0) {
                    itemsHtml += '<table class="data-table" style="width: 100%;"><thead><tr><th>Product</th><th>Qty</th><th>Price</th></tr></thead><tbody>';
                    order.items.forEach(item => {
                        const price = typeof KalpaLayout !== 'undefined' ? KalpaLayout.formatCurrency(item.price || 0) : '₹' + (item.price || 0);
                        itemsHtml += `
                            <tr>
                                <td>${item.name || item.productName || 'Unknown Product'}</td>
                                <td>${item.quantity || 1}</td>
                                <td>${price}</td>
                            </tr>
                        `;
                    });
                    itemsHtml += '</tbody></table></div>';
                } else {
                    itemsHtml += '<p>No items found.</p></div>';
                }

                const totalFormatted = typeof KalpaLayout !== 'undefined' ? KalpaLayout.formatCurrency(order.total) : '₹' + order.total;
                const dateFormatted = typeof KalpaLayout !== 'undefined' ? KalpaLayout.formatDate(order.date) : order.date;
                const statusBadge = typeof KalpaLayout !== 'undefined' ? KalpaLayout.statusBadge(order.status) : order.status;
                const deliveryDateFormatted = order.deliveryDate ? (typeof KalpaLayout !== 'undefined' ? KalpaLayout.formatDate(order.deliveryDate) : order.deliveryDate) : 'N/A';

                modalBody.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <div>
                            <p style="color: var(--gray-500); font-size: 0.875rem; margin-bottom: 0.25rem;">Order ID</p>
                            <p style="font-family: monospace; font-weight: 600; color: var(--primary);">${order.id}</p>
                        </div>
                        <div>
                            <p style="color: var(--gray-500); font-size: 0.875rem; margin-bottom: 0.25rem;">Status</p>
                            <p>${statusBadge}</p>
                        </div>
                        <div>
                            <p style="color: var(--gray-500); font-size: 0.875rem; margin-bottom: 0.25rem;">Customer</p>
                            <p style="font-weight: 500;">${order.customer?.name || 'N/A'}</p>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">${order.customer?.email || ''}</p>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">${order.customer?.city || ''}</p>
                        </div>
                        <div>
                            <p style="color: var(--gray-500); font-size: 0.875rem; margin-bottom: 0.25rem;">Payment Method</p>
                            <p>${order.paymentMethod || 'N/A'}</p>
                        </div>
                        <div>
                            <p style="color: var(--gray-500); font-size: 0.875rem; margin-bottom: 0.25rem;">Order Date</p>
                            <p>${dateFormatted}</p>
                        </div>
                        <div>
                            <p style="color: var(--gray-500); font-size: 0.875rem; margin-bottom: 0.25rem;">Expected Delivery</p>
                            <p>${deliveryDateFormatted}</p>
                        </div>
                        <div style="grid-column: span 2;">
                            <p style="color: var(--gray-500); font-size: 0.875rem; margin-bottom: 0.25rem;">Total Amount</p>
                            <p style="font-weight: 600; font-size: 1.125rem;">${totalFormatted}</p>
                        </div>
                    </div>
                    ${itemsHtml}
                `;
                
                modal.classList.add('open');
            }

            function closeModal() {
                modal.classList.remove('open');
            }

            // Event Listeners
            searchInput.addEventListener('input', filterOrders);
            statusFilter.addEventListener('change', filterOrders);
            
            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // Initialize
            loadData();
        });
    </script>
</body>
</html>
