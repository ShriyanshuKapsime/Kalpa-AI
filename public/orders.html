<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Kalpa AI</title>
    <!-- Shared CSS files -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-layout">
        <div class="app-main">
            <div class="page-content">
                <!-- Page Header -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Orders</h1>
                        <p class="page-subtitle">Track and manage customer orders</p>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid-5 stagger-children" id="orders-stats">
                    <div class="stat-card card">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" id="stat-total-orders">0</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="stat-pending">0</div>
                        <div class="stat-trend badge badge-warning">Pending</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Processing</div>
                        <div class="stat-value" id="stat-processing">0</div>
                        <div class="stat-trend badge badge-info">Processing</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Delivered</div>
                        <div class="stat-value" id="stat-delivered">0</div>
                        <div class="stat-trend badge badge-success">Delivered</div>
                    </div>
                    <div class="stat-card card">
                        <div class="stat-label">Total Revenue</div>
                        <div class="stat-value" id="stat-total-revenue">0</div>
                    </div>
                </div>

                <!-- Orders Table -->
                <div class="card table-container" style="margin-top: 1.5rem;">
                    <div class="table-toolbar" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <input type="text" id="order-search" class="form-input" placeholder="Search by Order ID or Customer..." style="max-width: 300px;">
                        <select id="order-status-filter" class="form-input" style="max-width: 200px;">
                            <option value="">All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table" id="orders-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Items</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Payment</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                    <div id="pagination-container" style="margin-top: 1rem;">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="modal-backdrop">
        <div class="modal-container card" style="max-width: 700px; width: 100%; margin: 4rem auto; max-height: 80vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-200); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h2 style="font-size: 1.25rem; font-weight: 600;">Order Details</h2>
                <button id="close-modal" class="btn btn-icon" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body" id="order-modal-body">
                <!-- Order details will go here -->
            </div>
        </div>
    </div>

    <!-- Shared JS files -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/animations.js"></script>
    
    <!-- Page specific logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize layout
            KalpaLayout.init();

            // Page State
            let allOrders = [];
            let filteredOrders = [];
            let currentPage = 1;
            const itemsPerPage = 10;

            // DOM Elements
            const tableBody = document.getElementById('orders-table-body');
            const searchInput = document.getElementById('order-search');
            const statusFilter = document.getElementById('order-status-filter');
            const paginationContainer = document.getElementById('pagination-container');
            const modal = document.getElementById('order-modal');
            const closeModalBtn = document.getElementById('close-modal');
            const modalBody = document.getElementById('order-modal-body');

            // Load Data
            function loadData() {
                try {
                    allOrders = KalpaStore.getOrders();
                    allOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    updateStats(allOrders);
                    filterOrders();
                } catch (error) {
                    console.error('Error loading orders:', error);
                    tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 2rem; color: var(--text-secondary);">Error loading orders.</td></tr>';
                }
            }

            function updateStats(orders) {
                const total = orders.length;
                let pending = 0;
                let processing = 0;
                let delivered = 0;
                let revenue = 0;

                orders.forEach(order => {
                    const status = (order.status || '').toLowerCase();
                    if (status === 'pending') pending++;
                    if (status === 'processing') processing++;
                    if (status === 'delivered') delivered++;
                    if (status !== 'cancelled') revenue += (order.amount || 0);
                });

                document.getElementById('stat-total-orders').textContent = total;
                document.getElementById('stat-pending').textContent = pending;
                document.getElementById('stat-processing').textContent = processing;
                document.getElementById('stat-delivered').textContent = delivered;
                document.getElementById('stat-total-revenue').textContent = KalpaLayout.formatCurrency(revenue);
            }

            function filterOrders() {
                const searchTerm = searchInput.value.toLowerCase();
                const statusTerm = statusFilter.value.toLowerCase();

                filteredOrders = allOrders.filter(order => {
                    const matchesSearch = 
                        (order.orderId && order.orderId.toLowerCase().includes(searchTerm)) || 
                        (order.customerName && order.customerName.toLowerCase().includes(searchTerm));
                    const matchesStatus = !statusTerm || (order.status && order.status.toLowerCase() === statusTerm);
                    return matchesSearch && matchesStatus;
                });

                currentPage = 1;
                renderTable();
            }

            function renderTable() {
                tableBody.innerHTML = '';
                
                const startIdx = (currentPage - 1) * itemsPerPage;
                const endIdx = startIdx + itemsPerPage;
                const paginatedOrders = filteredOrders.slice(startIdx, endIdx);

                if (paginatedOrders.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 2rem;">No orders found.</td></tr>';
                } else {
                    paginatedOrders.forEach(order => {
                        const tr = document.createElement('tr');
                        tr.style.cursor = 'pointer';
                        
                        const itemsCount = order.items ? order.items.reduce((sum, item) => sum + (item.qty || 1), 0) : 0;
                        
                        tr.innerHTML = `
                            <td><span style="font-family: monospace; color: var(--primary, #2563EB);">${order.orderId || order.id}</span></td>
                            <td>${order.customerName || 'N/A'}</td>
                            <td>${itemsCount}</td>
                            <td>${KalpaLayout.formatCurrency(order.amount || 0)}</td>
                            <td>${KalpaLayout.statusBadge(order.status)}</td>
                            <td>${order.paymentMethod || 'N/A'}</td>
                            <td>${KalpaLayout.formatDate(order.createdAt)}</td>
                            <td onclick="event.stopPropagation()">
                                <button class="btn btn-icon view-btn" title="View Order" style="background:none;border:none;cursor:pointer;padding:4px;">
                                    ${KalpaLayout.icons.eye || '👁️'}
                                </button>
                                <select class="form-input" style="max-width:120px;padding:4px 6px;font-size:12px;" onchange="updateOrderStatus('${order.id}', this.value)" onclick="event.stopPropagation()">
                                    <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                    <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Packed</option>
                                    <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                    <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                    <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </td>
                        `;

                        tr.addEventListener('click', () => openModal(order));
                        
                        const viewBtn = tr.querySelector('.view-btn');
                        if (viewBtn) {
                            viewBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                openModal(order);
                            });
                        }

                        tableBody.appendChild(tr);
                    });
                }

                renderPagination();
            }

            function renderPagination() {
                const totalPages = Math.ceil(filteredOrders.length / itemsPerPage);
                KalpaLayout.renderPagination(paginationContainer, currentPage, totalPages, (newPage) => {
                    currentPage = newPage;
                    renderTable();
                });
            }

            function openModal(order) {
                let itemsHtml = '<div style="margin-top: 1.5rem;"><h3 style="font-size: 1rem; margin-bottom: 0.5rem; font-weight: 600;">Order Items</h3>';
                if (order.items && order.items.length > 0) {
                    itemsHtml += '<table class="data-table" style="width: 100%;"><thead><tr><th>Product</th><th>Qty</th><th>Price</th></tr></thead><tbody>';
                    order.items.forEach(item => {
                        const price = KalpaLayout.formatCurrency((item.price || 0) * (item.qty || 1));
                        itemsHtml += `
                            <tr>
                                <td>${item.name || 'Unknown Product'}</td>
                                <td>${item.qty || 1}</td>
                                <td>${price}</td>
                            </tr>
                        `;
                    });
                    itemsHtml += '</tbody></table></div>';
                } else {
                    itemsHtml += '<p>No items found.</p></div>';
                }

                const totalFormatted = KalpaLayout.formatCurrency(order.amount || 0);
                const dateFormatted = KalpaLayout.formatDate(order.createdAt);
                const statusBadge = KalpaLayout.statusBadge(order.status);
                const deliveryDateFormatted = order.deliveryDate ? KalpaLayout.formatDate(order.deliveryDate) : 'N/A';

                modalBody.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <div>
                            <p style="color: #9CA3AF; font-size: 0.875rem; margin-bottom: 0.25rem;">Order ID</p>
                            <p style="font-family: monospace; font-weight: 600; color: var(--primary, #2563EB);">${order.orderId || order.id}</p>
                        </div>
                        <div>
                            <p style="color: #9CA3AF; font-size: 0.875rem; margin-bottom: 0.25rem;">Status</p>
                            <p>${statusBadge}</p>
                        </div>
                        <div>
                            <p style="color: #9CA3AF; font-size: 0.875rem; margin-bottom: 0.25rem;">Customer</p>
                            <p style="font-weight: 500;">${order.customerName || 'N/A'}</p>
                            <p style="font-size: 0.875rem; color: #9CA3AF;">${order.customerEmail || ''}</p>
                            <p style="font-size: 0.875rem; color: #9CA3AF;">${order.customerCity || ''}</p>
                        </div>
                        <div>
                            <p style="color: #9CA3AF; font-size: 0.875rem; margin-bottom: 0.25rem;">Payment Method</p>
                            <p>${order.paymentMethod || 'N/A'}</p>
                        </div>
                        <div>
                            <p style="color: #9CA3AF; font-size: 0.875rem; margin-bottom: 0.25rem;">Order Date</p>
                            <p>${dateFormatted}</p>
                        </div>
                        <div>
                            <p style="color: #9CA3AF; font-size: 0.875rem; margin-bottom: 0.25rem;">Expected Delivery</p>
                            <p>${deliveryDateFormatted}</p>
                        </div>
                        <div style="grid-column: span 2;">
                            <p style="color: #9CA3AF; font-size: 0.875rem; margin-bottom: 0.25rem;">Total Amount</p>
                            <p style="font-weight: 600; font-size: 1.125rem;">${totalFormatted}</p>
                        </div>
                    </div>
                    ${itemsHtml}
                `;
                
                modal.classList.add('open');
            }

            function closeModal() {
                modal.classList.remove('open');
            }

            // Event Listeners
            searchInput.addEventListener('input', filterOrders);
            statusFilter.addEventListener('change', filterOrders);
            
            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // Initialize
            loadData();
        });

        function updateOrderStatus(orderId, newStatus) {
            KalpaStore.updateOrderStatus(orderId, newStatus);
            KalpaAnimations.showToast('Status Updated', `Order status changed to ${newStatus}`, 'success');
            setTimeout(() => location.reload(), 800);
        }
    </script>
</body>
</html>
